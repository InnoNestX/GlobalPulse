name: PR Description Summary

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - name: Generate PR Summary
        uses: actions/github-script@v7
        with:
          script: |
            const { github, context } = require('@actions/github');
            const pr = context.payload.pull_request;

            const title = pr.title;
            const body = pr.body || '';
            const changedFiles = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number
            });

            const files = changedFiles.data.map(f => f.filename);
            const additions = changedFiles.data.reduce((sum, f) => sum + f.additions, 0);
            const deletions = changedFiles.data.reduce((sum, f) => sum + f.deletions, 0);

            const fileList = files.map(f => '- `' + f + '`').join('\n');

            const summary = '## PR Summary\n\n**Title:** ' + title + '\n\n**Files changed:** ' + files.length + ' (+' + additions + ' / -' + deletions + ')\n\n### Changed Files\n' + fileList + '\n\n---\n*Auto-generated by GlobalPulse CI*';

            if (!body || body.trim() === '') {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                body: summary
              });
            }
