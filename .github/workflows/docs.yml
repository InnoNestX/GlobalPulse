name: Deploy Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build
        run: |
          cd docs-site
          npm ci
          npm run docs:build
          mkdir -p _site
          cp -r .vitepress/dist/docs/* _site/
          cp -r .vitepress/dist/assets _site/
          cp .vitepress/dist/*.css _site/ 2>/dev/null || true
          cp .vitepress/dist/*.json _site/ 2>/dev/null || true
          cp .vitepress/dist/logo.svg _site/ 2>/dev/null || true
          cat > _site/index.html << 'HTMLEOF'
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0;url=/en/">
  <title>GlobalPulse Documentation</title>
</head>
<body>
  <p>Redirecting to documentation...</p>
  <p><a href="/en/">English</a> | <a href="/zh/">中文</a></p>
</body>
</html>
HTMLEOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions/gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs-site/_site
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com