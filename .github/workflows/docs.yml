name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run docs:build

      - name: Move docs to root
        run: |
          mkdir -p _site
          cp -r .vitepress/dist/docs/* _site/
          cp -r .vitepress/dist/assets _site/
          cp -r .vitepress/dist/*.css _site/ 2>/dev/null || true
          cp -r .vitepress/dist/*.html _site/ 2>/dev/null || true
          cp -r .vitepress/dist/hashmap.json _site/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4