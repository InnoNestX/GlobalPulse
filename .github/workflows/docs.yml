name: Deploy Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Build
        run: |
          cd docs-site
          npm ci
          npm run docs:build
          mkdir -p _site
          cp -r .vitepress/dist/docs/* _site/
          cp -r .vitepress/dist/assets _site/
          cp .vitepress/dist/*.css _site/ 2>/dev/null || true
          cp .vitepress/dist/*.json _site/ 2>/dev/null || true
          cp .vitepress/dist/logo.svg _site/ 2>/dev/null || true
          cat > _site/index.html << 'HTMLEOF'
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0;url=/en/">
  <title>GlobalPulse Documentation</title>
</head>
<body>
  <p>Redirecting to documentation...</p>
  <p><a href="/en/">English</a> | <a href="/zh/">中文</a></p>
</body>
</html>
HTMLEOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/_site

      - name: Deploy
        uses: actions/deploy-pages@v4