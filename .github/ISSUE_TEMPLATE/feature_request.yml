name: Feature request
description: Suggest a capability, data source, provider, or UI improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Share the workflow you want GlobalPulse to support. Please do not include secrets or private webhook URLs.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      placeholder: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Describe the behavior you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Admin UI
        - Scheduling
        - Data generation
        - Feishu
        - WeChat
        - Telegram
        - Cloudflare deployment
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links and screenshots are welcome after removing sensitive information.
